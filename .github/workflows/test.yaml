name: Test
on: [push]

jobs:
  test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Build & Test
        run: |
          go test -race ./...
